
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;direction:rtl}
.gold{color:#C9A84C}
.btn-gold{background:#C9A84C;color:#000;border:none;border-radius:999px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-gold:hover{filter:brightness(1.1);transform:scale(1.03)}
.btn-outline{background:transparent;border:1.5px solid #C9A84C;color:#C9A84C;border-radius:999px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.btn-outline:hover{background:rgba(201,168,76,.1)}
.card{background:#111;border:1px solid #222;border-radius:18px;padding:20px}
input,select{background:#0a0a0a;border:1px solid #333;border-radius:12px;color:#fff;padding:10px 14px;font-size:14px;width:100%;font-family:inherit;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#C9A84C}
input[type=time]{color-scheme:dark}
input[type=date]{color-scheme:dark}
.tab-bar{display:flex;border-bottom:1px solid #222;background:#0a0a0a;position:sticky;top:0;z-index:10}
.tab{padding:14px 20px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:6px;border-bottom:2px solid transparent;color:#666}
.tab.active{color:#C9A84C;border-bottom-color:#C9A84C}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;font-weight:600}
.badge-pending{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.4)}
.badge-approved{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.4)}
.badge-cancelled{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.4)}
.slot{border-radius:10px;padding:10px 4px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border:1px solid #333;transition:all .2s;background:transparent;color:#fff;font-family:inherit}
.slot:hover{border-color:#C9A84C}
.slot.sel{background:#C9A84C;color:#000;border-color:#C9A84C}
.slot.booked{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.3);cursor:default}
.slot.free{background:rgba(34,197,94,.1);color:#22c55e;border-color:rgba(34,197,94,.25)}
.day-btn{border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid #333;background:transparent;color:#aaa;transition:all .2s;font-family:inherit}
.day-btn.on{background:#C9A84C;color:#000;border-color:#C9A84C}
.day-btn:hover:not(.on){border-color:#C9A84C}
.cal-cell{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s;position:relative;border:1px solid transparent;font-weight:500}
.cal-cell:hover{background:rgba(255,255,255,.07)}
.cal-cell.sel{background:#C9A84C;color:#000;font-weight:700}
.cal-cell.today:not(.sel){border-color:#C9A84C}
.cal-cell.past{opacity:.3;cursor:default}
.cal-cell.nonwork{opacity:.25;cursor:default}
.dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:2px}
.appt-row{background:#111;border:1px solid #222;border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;transition:border .2s}
.appt-row:hover{border-color:#333}
.btn-sm{font-size:11px;padding:5px 12px;border-radius:8px;cursor:pointer;font-weight:600;border:1px solid;transition:all .2s;font-family:inherit;background:transparent}
.btn-approve{color:#22c55e;border-color:rgba(34,197,94,.4)}
.btn-approve:hover{background:rgba(34,197,94,.15)}
.btn-cancel{color:#ef4444;border-color:rgba(239,68,68,.4)}
.btn-cancel:hover{background:rgba(239,68,68,.15)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:#111;border:1px solid #2a2a2a;border-radius:20px;padding:24px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0a0a0a;z-index:20}
.section{max-width:480px;margin:0 auto;padding:24px 16px}
.hero-title{font-weight:900;letter-spacing:.15em;line-height:1;font-size:clamp(80px,18vw,140px)}
.stat-card{background:#111;border:1px solid #222;border-radius:16px;padding:20px}
.chart-bar{border-radius:5px 5px 0 0;transition:height .3s}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px}
textarea{background:#0a0a0a;border:1px solid #333;border-radius:12px;color:#fff;padding:10px 14px;font-size:14px;width:100%;font-family:inherit;outline:none;resize:none}
</style>

function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dateToStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dispDate(ds){if(!ds)return'';const[y,m,d]=ds.split('-');return d+'/'+m+'/'+y}

function genSlots(start,end,dur){
  const s=[];const[sh,sm]=start.split(':').map(Number);const[eh,em]=end.split(':').map(Number);
  let cur=sh*60+sm;const endM=eh*60+em;
  while(cur+dur<=endM){s.push(String(Math.floor(cur/60)).padStart(2,'0')+':'+String(cur%60).padStart(2,'0'));cur+=dur;}
  return s;
}
function within24h(ds,ts){try{return(new Date(ds+'T'+ts)-new Date())<86400000}catch{return true}}
function bookedOnDate(ds){return appointments.filter(a=>a.date===ds&&a.status!=='cancelled').map(a=>a.time)}
function freeSlots(ds){const all=genSlots(settings.workingHours.start,settings.workingHours.end,settings.slotDuration);const b=bookedOnDate(ds);return all.filter(s=>!b.includes(s))}

async function loadData(){
  try{const r=await window.storage.get('la-s');if(r)settings=JSON.parse(r.value);}catch{}
  try{const r=await window.storage.get('la-a');if(r)appointments=JSON.parse(r.value);}catch{}
  try{const r=await window.storage.get('la-adm');if(r&&JSON.parse(r.value)){view='admin';localSettings=JSON.parse(JSON.stringify(settings));}}catch{}
  render();
}
async function saveSettings(){try{await window.storage.set('la-s',JSON.stringify(settings));}catch{}}
async function saveAppts(){try{await window.storage.set('la-a',JSON.stringify(appointments));}catch{}}

function genId(){return Math.random().toString(36).substr(2,9)+Date.now().toString(36).substr(-4)}

const t=()=>lang==='he'?T.he:T.en;
const dir=()=>lang==='he'?'rtl':'ltr';

function getDayInfo(ds){
  const dow=new Date(ds+'T12:00:00').getDay();
  if(!settings.workingDays.includes(dow))return'nonwork';
  if((settings.blockedDates||[]).includes(ds))return'blocked';
  const all=genSlots(settings.workingHours.start,settings.workingHours.end,settings.slotDuration);
  const cnt=appointments.filter(a=>a.date===ds&&a.status!=='cancelled').length;
  if(cnt===0)return'free';if(cnt>=all.length)return'full';return'partial';
}

      ${!showBack?`<button onclick="goAdminLogin()" style="background:transparent;border:none;color:#555;cursor:pointer" title="${tt.adminLink}"><i class="ti ti-lock" aria-hidden="true" style="font-size:18px"></i></button>`:''}
    </div>
  </div>`;
}

function renderClient(){
  const tt=t();
  if(step==='home')return renderHome();
  if(step==='myappts')return renderMyAppts();
  if(step==='date')return renderDateStep();
  if(step==='time')return renderTimeStep();
  if(step==='form')return renderFormStep();
  if(step==='done')return renderDoneStep();

}

function renderMyAppts(){
  const tt=t();
  let content='';

            <div style="text-align:end">
              <span class="badge badge-${a.status}">${tt[a.status]}</span>

    <h2 style="font-size:22px;font-weight:700;margin-bottom:24px;text-align:center">${tt.myAppointments}</h2>

function renderCalendar(selD,onselFn,isAdmin=false,vDate=null){
  const tt=t();
  const v=vDate||calViewDate;
  const today=todayStr();
  const dim=new Date(v.y,v.m+1,0).getDate();
  const fd=new Date(v.y,v.m,1).getDay();
  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <button onclick="${isAdmin?'adminCalPrev()':'calPrev()'}" style="width:34px;height:34px;border-radius:50%;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:16px">‹</button>
    <span style="font-weight:700;font-size:15px">${tt.months[v.m]} ${v.y}</span>
    <button onclick="${isAdmin?'adminCalNext()':'calNext()'}" style="width:34px;height:34px;border-radius:50%;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:16px">›</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">`;
  tt.days.forEach(d=>{html+=`<div style="text-align:center;font-size:11px;color:#555;padding:4px;font-weight:600">${d}</div>`;});
  html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">';
  for(let i=0;i<fd;i++)html+='<div></div>';
  for(let day=1;day<=dim;day++){
    const ds=v.y+'-'+String(v.m+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    const isPast=ds<today,isToday=ds===today,isSel=ds===selD;
    const info=getDayInfo(ds);
    const dotCol={free:'#22c55e',partial:GOLD,full:'#ef4444',blocked:'#555',nonwork:'#333'}[info]||'#333';
    const clickable=!isPast&&info!=='nonwork'&&info!=='blocked'&&(isAdmin||info!=='full');
    const classes=['cal-cell'];
    if(isSel)classes.push('sel');
    if(isToday&&!isSel)classes.push('today');
    if(isPast||info==='nonwork')classes.push('past');
    html+=`<div class="${classes.join(' ')}" onclick="${clickable?onselFn+'(\''+ds+'\')':''}" style="${!clickable&&!isPast&&info!=='nonwork'?'cursor:default;':''}">
      ${day}
      ${!isSel&&!isPast&&info!=='nonwork'?`<span class="dot" style="background:${dotCol}"></span>`:''}
    </div>`;
  }
  html+='</div><div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;justify-content:center">';
  [{c:'#22c55e',l:tt.available},{c:GOLD,l:tt.partial},{c:'#ef4444',l:tt.booked},{c:'#555',l:tt.blocked}].forEach(x=>{
    html+=`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:#555"><span style="width:8px;height:8px;border-radius:50%;background:${x.c};display:inline-block"></span>${x.l}</span>`;
  });
  html+='</div>';
  return html;
}

function renderAdminOverview(){
  const tt=t();
  const today=todayStr();
  const wd=getWeekDates();
  const tm=today.slice(0,7);
  const todayA=appointments.filter(a=>a.date===today&&a.status!=='cancelled');
  const weekA=appointments.filter(a=>wd.includes(a.date)&&a.status!=='cancelled');
  const monA=appointments.filter(a=>a.date.startsWith(tm)&&a.status!=='cancelled');
  const hb={};appointments.forEach(a=>{if(a.status!=='cancelled'&&a.time){const h=a.time.slice(0,2);hb[h]=(hb[h]||0)+1;}});
  const peak=Object.entries(hb).sort((a,b)=>b[1]-a[1])[0];
  const stats=[
    {l:tt.totalToday,v:todayA.length,i:'ti-calendar'},
    {l:tt.totalWeek,v:weekA.length,i:'ti-chart-bar'},
    {l:tt.totalMonth,v:monA.length,i:'ti-users'},
    {l:tt.peakHour,v:peak?peak[0]+':00':'—',i:'ti-clock'},
  ];
  let html=`<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px">`;
  stats.forEach(s=>{html+=`<div class="stat-card"><i class="ti ${s.i}" aria-hidden="true" style="font-size:20px;color:${GOLD};margin-bottom:10px;display:block"></i><p style="font-size:28px;font-weight:900">${s.v}</p><p style="font-size:11px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:.06em">${s.l}</p></div>`;});
  html+='</div>';

  // Chart
  const cd=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-6+i);const ds=dateToStr(d);return{day:d.getDate()+'/'+(d.getMonth()+1),count:appointments.filter(a=>a.date===ds&&a.status!=='cancelled').length};});
  const mx=Math.max(...cd.map(x=>x.count),1);
  html+=`<div class="card" style="margin-bottom:20px"><p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px">${tt.week7}</p>
    <div style="display:flex;align-items:flex-end;gap:6px;height:120px">`;
  cd.forEach((d,i)=>{const h=Math.max(8,Math.round((d.count/mx)*100));const isLast=i===cd.length-1;
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="chart-bar" style="width:100%;height:${h}px;background:${isLast?GOLD:'#222'};border-radius:4px 4px 0 0" title="${d.count}"></div>
      <p style="font-size:10px;color:#555">${d.day}</p>
    </div>`;});
  html+='</div></div>';

  // Today's appts
  html+=`<div class="card"><p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px">${tt.todayAppts}</p>`;
  if(todayA.length===0)html+=`<p style="color:#444;font-size:13px;text-align:center;padding:24px 0">${tt.noToday}</p>`;
  else [...todayA].sort((a,b)=>a.time.localeCompare(b.time)).forEach(a=>{
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #1a1a1a">
      <div style="display:flex;align-items:center;gap:14px">
        <span style="color:${GOLD};font-size:20px;font-weight:900;width:52px;flex-shrink:0">${a.time}</span>
        <div><p style="font-size:14px;font-weight:600">${a.clientName}</p><p style="font-size:12px;color:#555">${a.phone}</p></div>
      </div>
      <span class="badge badge-${a.status}">${tt[a.status]}</span>
    </div>`;
  });
  html+='</div>';
  return html;
}

function getWeekDates(){const d=new Date();const day=d.getDay();const s=new Date(d);s.setDate(d.getDate()-day);return Array.from({length:7},(_,i)=>{const dd=new Date(s);dd.setDate(s.getDate()+i);return dateToStr(dd);});}

  if(to==='home')step='home';

  else if(to==='time')step='time';
  render();
}
function toggleLang(){lang=lang==='he'?'en':'he';document.body.dir=dir();render()}
function goAdminLogin(){view='adminlogin';render()}

function calPrev(){if(calViewDate.m===0){calViewDate={y:calViewDate.y-1,m:11}}else{calViewDate.m--;}render()}
function calNext(){if(calViewDate.m===11){calViewDate={y:calViewDate.y+1,m:0}}else{calViewDate.m++;}render()}
function adminCalPrev(){if(adminCalViewDate.m===0){adminCalViewDate={y:adminCalViewDate.y-1,m:11}}else{adminCalViewDate.m--;}render()}
function adminCalNext(){if(adminCalViewDate.m===11){adminCalViewDate={y:adminCalViewDate.y+1,m:0}}else{adminCalViewDate.m++;}render()}
function adminSelCal(ds){adminCalSel=adminCalSel===ds?null:ds;render()}
function updateConfirmBtn(){const btn=document.getElementById('confirmBtn');if(btn)btn.style.opacity=clientName.trim()&&clientPhone.trim()?1:.4}
function doLookup(){const v=document.getElementById('myPhoneInp');if(v)myPhone=v.value;const found=appointments.filter(a=>a.phone===myPhone.trim()&&a.status!=='cancelled');myAppts=found.sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));render()}
function resetLookup(){myAppts=null;myPhone='';cancelMsg='';render()}
function doCancel(id){
  const a=appointments.find(x=>x.id===id);
  if(!a)return;
  if(within24h(a.date,a.time)){cancelMsg=t().cannotCancel;render();return;}
  appointments=appointments.map(x=>x.id===id?{...x,status:'cancelled'}:x);
  myAppts=myAppts.filter(x=>x.id!==id);
  saveAppts();cancelMsg='';render();
}
async function doBook(){
  if(!clientName.trim()||!clientPhone.trim())return;
  const a={id:genId(),clientName:clientName.trim(),phone:clientPhone.trim(),date:selDate,time:selTime,status:'pending',createdAt:new Date().toISOString()};
  appointments=[...appointments,a];
  await saveAppts();step='done';render();
}
function resetBooking(){step='home';selDate=null;selTime=null;clientName='';clientPhone='';render()}
function doLogin(){
  if(adminPassInput===PASS){view='admin';localSettings=JSON.parse(JSON.stringify(settings));loginErr=false;try{window.storage.set('la-adm','true')}catch{}}
  else{loginErr=true;}render();
}
async function doLogout(){view='client';step='home';try{await window.storage.delete('la-adm')}catch{} render()}
function doApprove(id){appointments=appointments.map(a=>a.id===id?{...a,status:'approved'}:a);saveAppts();render()}
function doCancelAdmin(id){appointments=appointments.map(a=>a.id===id?{...a,status:'cancelled'}:a);saveAppts();render()}
function toggleDay(i){const ls=localSettings;if(ls.workingDays.includes(i))ls.workingDays=ls.workingDays.filter(d=>d!==i);else ls.workingDays=[...ls.workingDays,i].sort();render()}
function addBlock(){if(!newBlock)return;const ls=localSettings;if(!ls.blockedDates.includes(newBlock))ls.blockedDates=[...ls.blockedDates,newBlock];newBlock='';render()}
function removeBlock(d){localSettings.blockedDates=localSettings.blockedDates.filter(x=>x!==d);render()}
async function doSaveSettings(){settings=JSON.parse(JSON.stringify(localSettings));await saveSettings();saveFlash=true;render();setTimeout(()=>{saveFlash=false;render()},2000)}
async function doAddManual(){
  const addDate=window._addDate||todayStr();
  const addTime=window._addTime||'';
  const addName=window._addName||'';
  const addPhone=window._addPhone||'';
  if(!addName||!addPhone||!addDate||!addTime)return;
  const a={id:genId(),clientName:addName,phone:addPhone,date:addDate,time:addTime,status:'approved',createdAt:new Date().toISOString()};
  appointments=[...appointments,a];
  await saveAppts();
  showAddModal=false;window._addDate=null;window._addTime=null;window._addName=null;window._addPhone=null;render();
}
function bindEvents(){}

// Boot
loadData();
</script>
